# =========================================================================
# Configuración Sugerida de Nginx para VitalisNet en Oracle Cloud (OCI)
# Redirige el tráfico de vitalisnet.cl y api.vitalisnet.cl al puerto 8000
# =========================================================================

server {
    listen 80;
    server_name vitalisnet.cl www.vitalisnet.cl api.vitalisnet.cl;

    # Redirección automática a HTTPS (descomentar tras configurar SSL)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

